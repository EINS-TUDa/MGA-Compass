name: Backend Tests

on:
  push:
    paths:
      - 'app/backend/**'
      - 'mga-compass/**'
  pull_request:
    paths:
      - 'app/backend/**'
      - 'mga-compass/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python
        run: uv python install 3.14
        working-directory: app/backend

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: app/backend

      - name: Run tests
        run: uv run pytest
        working-directory: app/backend
